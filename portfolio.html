<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description">
    <link rel="stylesheet" href="styles.css">
    <title>Projects Portfolio</title>
</head>
<body id="home">
    <div class="page-wrapper">
        <header>
            <h1>Projects Portfolio</h1>
        </header>
        <button class="hamburger">&#9776;</button>
        <nav role="navigation">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <main>
            <section id="projects-container">
                <h2 class="projects-header">My Projects</h2>
                <input type="text"
                       placeholder="Search projects..."
                       class="projects-search"
                       oninput="filterProjects(this.value)">
                <section id="projects" class="projects">
                </section>
            </section>
            <aside class="skills">
                <ul>
                    <li>.NET development</li>
                    <li>Python development</li>
                    <li>Industrial Automation</li>
                </ul>
            </aside>
        </main>
        <section id="about" class="about">
            <h2>About me</h2>
            <p>I am a Control and Automation Engineer working with software development.</p>
        </section>
        <section id="contact" class="contact">
            <h2>Contact Me</h2>
            <form id="contact-form" action="/send-contact" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <span class="error" id="name-error"></span>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <span class="error" id="email-error"></span>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                <span class="error" id="message-error"></span>

                <button type="submit">Send</button>
            </form>
        </section>
        <div class="lightbox">
            <img class="lightbox-img" src="" alt="">
        </div>

        <footer>
            <p>&copy; 2026 Temp Project. All Rights Reserved.</p>
        </footer>
        <script src="menu.js"></script>
        <script src="project-card.js"></script>
        <script src="projects.js"></script>
        <script src="contact.js"></script>
    </div>
</body>
</html>
